name = "bonae-content-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "CONTENT_STORE"
class_name = "ContentStore"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ContentStore"]

[vars]
GITHUB_REPO = "Bonae-Tech/bonae-tech"
GITHUB_BRANCH = "main"
CONTENT_PATH_PREFIX = "apps/static/content"
COGNITO_REGION = "sa-east-1"
# Set via wrangler secret or dashboard: GITHUB_APP_ID, GITHUB_INSTALLATION_ID, GITHUB_PRIVATE_KEY
# Set via wrangler vars or CI: COGNITO_USER_POOL_ID, COGNITO_CLIENT_ID

[env.staging]
name = "bonae-content-api-staging"

[[env.staging.durable_objects.bindings]]
name = "CONTENT_STORE"
class_name = "ContentStore"

[env.staging.vars]
GITHUB_REPO = "Bonae-Tech/bonae-tech"
GITHUB_BRANCH = "main"
CONTENT_PATH_PREFIX = "apps/static/content"
COGNITO_REGION = "sa-east-1"
