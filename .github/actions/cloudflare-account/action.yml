name: Resolve Cloudflare account
description: Resolve CLOUDFLARE_ACCOUNT_ID from repository variable or prod environment secret

inputs:
  cloudflare_account_id_var:
    description: CLOUDFLARE_ACCOUNT_ID repository variable (optional)
    required: false
    default: ''
  cloudflare_account_id_secret:
    description: CLOUDFLARE_ACCOUNT_ID prod environment secret (optional)
    required: false
    default: ''
  cloudflare_api_token:
    description: CLOUDFLARE_API_TOKEN prod environment secret
    required: true

outputs:
  account_id:
    description: Cloudflare account ID for Wrangler
    value: ${{ steps.cf_account.outputs.id }}

runs:
  using: composite
  steps:
    - name: Resolve Cloudflare account ID
      id: cf_account
      shell: bash
      env:
        FROM_VAR: ${{ inputs.cloudflare_account_id_var }}
        FROM_SECRET: ${{ inputs.cloudflare_account_id_secret }}
      run: |
        if [ -n "$FROM_VAR" ]; then
          echo "id=$FROM_VAR" >> "$GITHUB_OUTPUT"
        elif [ -n "$FROM_SECRET" ]; then
          echo "id=$FROM_SECRET" >> "$GITHUB_OUTPUT"
        else
          echo "::error::Missing CLOUDFLARE_ACCOUNT_ID. Add it as a prod environment secret or repository variable."
          exit 1
        fi

    - name: Verify Cloudflare API token
      shell: bash
      env:
        CLOUDFLARE_API_TOKEN: ${{ inputs.cloudflare_api_token }}
      run: |
        if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
          echo "::error::Missing CLOUDFLARE_API_TOKEN for the prod environment."
          exit 1
        fi
