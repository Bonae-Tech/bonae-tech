# Recurring deploy: admin SPA to Cloudflare Pages (bonae-admin).
# Solo código SPA — no verifica Worker ni bootstrap (usar Setup admin).
# First-time bootstrap: use "Setup admin" (creates project if missing, verifies Worker exists).
# Auto-triggers on push to main.
#
# See docs/workflows.md

name: Deploy admin

on:
  workflow_call:
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - 'packages/content/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch:

concurrency:
  group: deploy-admin
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-monorepo

      - name: Build admin SPA
        run: npx turbo run build --filter=bonae-admin
        env:
          # Same-origin /content/* via Cloudflare Pages → Worker service binding.
          VITE_API_BASE_URL: ''
          VITE_COGNITO_USER_POOL_ID: ${{ vars.COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.COGNITO_CLIENT_ID }}
          VITE_AWS_REGION: ${{ secrets.AWS_REGION }}

      - name: Inject SW build hash
        working-directory: apps/admin
        env:
          BUILD_HASH: ${{ github.sha }}
        run: node ../../scripts/inject-sw-build-hash.mjs dist

      - id: cloudflare
        uses: ./.github/actions/cloudflare-account
        with:
          cloudflare_account_id_var: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare_account_id_secret: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - uses: ./.github/actions/ensure-pages-project
        with:
          project_name: bonae-admin
          cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare_account_id: ${{ steps.cloudflare.outputs.account_id }}
          working_directory: apps/admin

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name bonae-admin
        working-directory: apps/admin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.cloudflare.outputs.account_id }}
