name: Deploy admin

on:
  workflow_call:
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - 'packages/content/**'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch:

concurrency:
  group: deploy-admin
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: ./.github/actions/build-content

      - name: Build admin SPA
        run: npm ci && npm run build
        working-directory: apps/admin
        env:
          # Empty API base URL = same-origin /content/* via Pages service binding
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
          VITE_COGNITO_USER_POOL_ID: ${{ vars.COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.COGNITO_CLIENT_ID }}
          VITE_AWS_REGION: ${{ secrets.AWS_REGION }}

      - id: cloudflare
        uses: ./.github/actions/cloudflare-account

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name bonae-admin
        working-directory: apps/admin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.cloudflare.outputs.account_id }}
