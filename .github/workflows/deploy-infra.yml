name: Deploy infra

on:
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - 'services/content-api/**'
      - 'packages/content/**'
      - '.github/workflows/deploy-infra.yml'
  workflow_dispatch:
    inputs:
      force_lambda_redeploy:
        description: Replace Lambda even if the built bundle hash is unchanged
        type: boolean
        default: false

concurrency:
  group: deploy-infra
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    name: Terraform plan
    runs-on: ubuntu-latest
    outputs:
      cors_origin: ${{ steps.tfvars.outputs.cors_origin }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Build content package
        run: npm ci && npm run build
        working-directory: packages/content

      - name: Build Lambda
        run: npm ci && npm run build
        working-directory: services/content-api

      - name: Resolve Terraform variables
        id: tfvars
        run: |
          if [ -n "${{ vars.ADMIN_CLOUDFRONT_DOMAIN }}" ]; then
            echo "cors_origin=https://${{ vars.ADMIN_CLOUDFRONT_DOMAIN }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify GitHub variables token
        env:
          GH_TOKEN: ${{ secrets.GH_REPO_VARIABLES_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Missing repository secret GH_REPO_VARIABLES_TOKEN. Add a classic PAT with repo scope (see infra/README.md bootstrap step)."
            exit 1
          fi
          gh api "repos/$GITHUB_REPOSITORY/actions/variables" --jq .total_count >/dev/null

      - name: Terraform init
        run: terraform init
        working-directory: infra/terraform

      - name: Terraform plan
        id: plan
        run: |
          set -o pipefail
          args=(-no-color -var-file=terraform.tfvars -out=tfplan)
          if [ -n "${{ steps.tfvars.outputs.cors_origin }}" ]; then
            args+=(-var "cors_origin=${{ steps.tfvars.outputs.cors_origin }}")
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_lambda_redeploy }}" = "true" ]; then
            args+=(-replace=aws_lambda_function.content_api)
          fi
          terraform plan "${args[@]}" 2>&1 | tee plan_output.txt
          exit ${PIPESTATUS[0]}
        working-directory: infra/terraform

      - name: Summarize Lambda plan
        working-directory: infra/terraform
        run: |
          if grep -q 'aws_lambda_function.content_api' plan_output.txt; then
            echo "::notice title=Lambda::This plan updates the content-api Lambda (code and/or forced replace)."
          else
            echo "::notice title=Lambda::No Lambda changes in this plan. The built bundle matches Terraform state; infra-only commits will not redeploy Lambda code."
          fi

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infra/terraform/tfplan
          retention-days: 1

      - name: Upload built Lambda as artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-dist
          path: services/content-api/dist/
          retention-days: 1

  apply:
    name: Terraform apply
    needs: [plan]
    runs-on: ubuntu-latest
    # This environment requires manual approval — configure reviewers in
    # GitHub repo Settings → Environments → infra-production
    environment: infra-production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: infra/terraform/

      - name: Download built Lambda
        uses: actions/download-artifact@v4
        with:
          name: lambda-dist
          path: services/content-api/dist/

      - name: Terraform init
        run: terraform init
        working-directory: infra/terraform

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan
        working-directory: infra/terraform

      - name: Store Terraform outputs as GitHub repository variables
        env:
          GH_TOKEN: ${{ secrets.GH_REPO_VARIABLES_TOKEN }}
        run: |
          cd infra/terraform

          USER_POOL_ID=$(terraform output -raw user_pool_id)
          CLIENT_ID=$(terraform output -raw user_pool_client_id)
          API_URL=$(terraform output -raw api_url)
          CF_DOMAIN=$(terraform output -raw admin_cloudfront_domain)
          CF_ID=$(terraform output -raw admin_cloudfront_distribution_id)
          S3_BUCKET=$(terraform output -raw admin_s3_bucket_name)

          gh variable set COGNITO_USER_POOL_ID   --body "$USER_POOL_ID" -R "$GITHUB_REPOSITORY"
          gh variable set COGNITO_CLIENT_ID      --body "$CLIENT_ID"    -R "$GITHUB_REPOSITORY"
          gh variable set API_BASE_URL           --body "$API_URL"      -R "$GITHUB_REPOSITORY"
          gh variable set ADMIN_CLOUDFRONT_DOMAIN --body "$CF_DOMAIN"   -R "$GITHUB_REPOSITORY"
          gh variable set ADMIN_CLOUDFRONT_ID    --body "$CF_ID"        -R "$GITHUB_REPOSITORY"
          gh variable set ADMIN_S3_BUCKET        --body "$S3_BUCKET"    -R "$GITHUB_REPOSITORY"

          echo "Outputs stored. Admin SPA will be available at: https://$CF_DOMAIN"
          echo ""
          echo "Next steps (one-time manual):"
          echo "  1. Update Secrets Manager with GitHub App credentials:"
          echo "     aws secretsmanager update-secret --secret-id bonae/github-app-content \\"
          echo "       --secret-string '{\"appId\":\"<ID>\",\"installationId\":\"<ID>\",\"privateKey\":\"<PEM>\"}' \\"
          echo "       --region ${{ secrets.AWS_REGION }}"
          echo "  2. Create Cognito admin user:"
          echo "     aws cognito-idp admin-create-user --user-pool-id $USER_POOL_ID --username editor@bonaetech.com --region ${{ secrets.AWS_REGION }}"
          echo "     aws cognito-idp admin-add-user-to-group --user-pool-id $USER_POOL_ID --username editor@bonaetech.com --group-name Administrators --region ${{ secrets.AWS_REGION }}"
          echo "  3. Trigger deploy-admin workflow to push the admin SPA to S3."
