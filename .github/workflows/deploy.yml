# Manual redeploy of a single runtime component. Does not run bootstrap steps
# (Cognito, Worker secrets, Pages project creation). Use "Bootstrap (one-time install)"
# for first-time setup.
#
# Push to main still auto-deploys site, admin, and worker when their paths change.
#
# See docs/workflows.md

name: Deploy (manual)

on:
  workflow_dispatch:
    inputs:
      target:
        description: Component to redeploy
        type: choice
        options:
          - site
          - admin
          - worker
        default: site

run-name: Deploy — ${{ inputs.target }}

concurrency:
  group: deploy-manual-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  deploy-site:
    if: inputs.target == 'site'
    uses: ./.github/workflows/deploy-site.yml
    secrets: inherit

  deploy-admin:
    if: inputs.target == 'admin'
    uses: ./.github/workflows/deploy-admin.yml
    secrets: inherit

  deploy-worker:
    if: inputs.target == 'worker'
    uses: ./.github/workflows/deploy-worker.yml
    secrets: inherit
