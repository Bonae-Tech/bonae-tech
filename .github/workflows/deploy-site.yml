name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - 'apps/static/**'
      - 'packages/content/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Environment secrets (e.g. CLOUDFLARE_API_TOKEN) are only exposed when the job
    # declares the matching environment name.
    environment: prod
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
        working-directory: packages/content
      - run: npm run build
        working-directory: packages/content
      - run: npm run validate:published
        working-directory: packages/content

      - run: npm ci
        working-directory: apps/static

      - run: npm run build
        working-directory: apps/static

      - name: Resolve Cloudflare account ID
        id: cf_account
        env:
          FROM_VAR: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          FROM_SECRET: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$FROM_VAR" ]; then
            echo "source=repository variable CLOUDFLARE_ACCOUNT_ID" >> "$GITHUB_OUTPUT"
            echo "id=$FROM_VAR" >> "$GITHUB_OUTPUT"
          elif [ -n "$FROM_SECRET" ]; then
            echo "source=prod environment secret CLOUDFLARE_ACCOUNT_ID" >> "$GITHUB_OUTPUT"
            echo "id=$FROM_SECRET" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Missing CLOUDFLARE_ACCOUNT_ID. Wrangler will call /memberships and fail with account-scoped API tokens. Add it as a prod environment secret OR repository variable named exactly CLOUDFLARE_ACCOUNT_ID (Cloudflare dashboard → Account ID in sidebar)."
            exit 1
          fi

      - name: Configure Wrangler account
        run: |
          ACCOUNT_ID="${{ steps.cf_account.outputs.id }}"
          if grep -q '^account_id' wrangler.toml; then
            sed -i "s/^account_id = .*/account_id = \"${ACCOUNT_ID}\"/" wrangler.toml
          else
            printf '\naccount_id = "%s"\n' "$ACCOUNT_ID" >> wrangler.toml
          fi
          echo "Wrangler account_id configured from ${{ steps.cf_account.outputs.source }}"

      - name: Verify Cloudflare API token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN for the prod environment. Add it under GitHub Settings → Environments → prod → Environment secrets."
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name bonae-tech
        working-directory: apps/static
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID  }}
