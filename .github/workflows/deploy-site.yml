name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - 'apps/static/**'
      - 'packages/content/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Environment secrets (e.g. CLOUDFLARE_API_TOKEN) are only exposed when the job
    # declares the matching environment name.
    environment: prod
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
        working-directory: packages/content
      - run: npm run build
        working-directory: packages/content
      - run: npm run validate:published
        working-directory: packages/content

      - run: npm ci
        working-directory: apps/static

      - run: npm run build
        working-directory: apps/static

      - name: Verify Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN for the prod environment. Add it under GitHub Settings → Environments → prod → Environment secrets."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Missing CLOUDFLARE_ACCOUNT_ID for the prod environment. Add your Cloudflare account ID (Dashboard → any account page → Account ID in the sidebar) as a prod environment secret. Without it, Wrangler calls /memberships which account tokens cannot access."
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name bonae-tech
        working-directory: apps/static
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
