name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - 'apps/static/**'
      - 'packages/content/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
        working-directory: packages/content
      - run: npm run build
        working-directory: packages/content
      - run: npm run validate:published
        working-directory: packages/content

      - run: npm ci
        working-directory: apps/static

      - run: npm run build
        working-directory: apps/static

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name bonae-tech
        working-directory: apps/static
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
