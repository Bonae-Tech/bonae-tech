# Recurring deploy: marketing site to Cloudflare Pages (bonae-tech).
# Creates the Pages project on first run. Auto-triggers on push to main when
# published content or shared schema changes (not draft edits or Astro source-only changes).
# Reports deploy outcome to the content API Worker for the admin publish overlay.
#
# See docs/workflows.md

name: Deploy site

on:
  workflow_call:
  push:
    branches: [main]
    paths:
      - 'apps/static/content/published/**'
      - 'apps/static/public/**'
      - 'apps/static/scripts/**'
      - 'packages/content/**'
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Environment secrets (e.g. CLOUDFLARE_API_TOKEN) are only exposed when the job
    # declares the matching environment name.
    environment: prod
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-monorepo
      - run: npx turbo run build validate:published --filter=bonae-static

      - name: Inject SW build hash
        working-directory: apps/static
        env:
          BUILD_HASH: ${{ github.sha }}
        run: node ./scripts/inject-sw-build-hash.mjs

      - id: cloudflare
        uses: ./.github/actions/cloudflare-account
        with:
          cloudflare_account_id_var: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare_account_id_secret: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - uses: ./.github/actions/ensure-pages-project
        with:
          project_name: bonae-tech
          cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare_account_id: ${{ steps.cloudflare.outputs.account_id }}
          working_directory: apps/static

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name bonae-tech
        working-directory: apps/static
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.cloudflare.outputs.account_id }}

      - name: Report deploy status to content API
        if: always()
        continue-on-error: true
        env:
          CONTENT_API_URL: ${{ secrets.CONTENT_API_URL }}
          PUBLISH_CALLBACK_SECRET: ${{ secrets.PUBLISH_CALLBACK_SECRET }}
          COMMIT_SHA: ${{ github.sha }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${CONTENT_API_URL}" ] || [ -z "${PUBLISH_CALLBACK_SECRET}" ]; then
            echo "Skipping publish callback (set CONTENT_API_URL and PUBLISH_CALLBACK_SECRET in prod environment secrets)"
            exit 0
          fi
          payload=$(jq -n \
            --arg commitSha "$COMMIT_SHA" \
            --arg status "$JOB_STATUS" \
            --arg runUrl "$RUN_URL" \
            '{commitSha: $commitSha, status: $status, runUrl: $runUrl}')
          http_code=$(curl -sS -o /tmp/publish-callback-response.txt -w "%{http_code}" \
            -X POST "${CONTENT_API_URL%/}/content/publish/callback" \
            -H "Authorization: Bearer ${PUBLISH_CALLBACK_SECRET}" \
            -H "Content-Type: application/json" \
            -d "$payload")
          if [ "$http_code" != "204" ]; then
            echo "::warning::Publish callback returned HTTP ${http_code}"
            cat /tmp/publish-callback-response.txt || true
            exit 1
          fi
          echo "Publish callback accepted (HTTP 204)"
