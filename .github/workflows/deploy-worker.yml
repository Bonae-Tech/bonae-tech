name: Deploy worker

on:
  workflow_call:
    inputs:
      environment:
        description: Wrangler environment (empty = production)
        type: string
        default: ''
  push:
    branches: [main]
    paths:
      - 'workers/content-api/**'
      - 'packages/content/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: Wrangler environment (empty = production, staging = staging)
        type: string
        default: ''

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: ./.github/actions/build-content

      - name: Install worker dependencies
        run: npm ci
        working-directory: workers/content-api

      - name: Typecheck worker
        run: npm run build
        working-directory: workers/content-api

      - name: Run security tests
        run: npm test
        working-directory: workers/content-api

      - id: cloudflare
        uses: ./.github/actions/cloudflare-account
        with:
          cloudflare_account_id_var: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare_account_id_secret: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy to Cloudflare Workers
        run: |
          args=(--var "COGNITO_USER_POOL_ID:${{ vars.COGNITO_USER_POOL_ID }}" --var "COGNITO_CLIENT_ID:${{ vars.COGNITO_CLIENT_ID }}")
          if [ -n "${{ inputs.environment }}" ]; then
            npx wrangler deploy --env "${{ inputs.environment }}" "${args[@]}"
          else
            npx wrangler deploy "${args[@]}"
          fi
        working-directory: workers/content-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.cloudflare.outputs.account_id }}
