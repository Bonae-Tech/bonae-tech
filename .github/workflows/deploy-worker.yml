# Recurring deploy: content API Worker code (bonae-content-api).
# Does not sync GitHub App secrets — use Setup worker for that.
# Auto-triggers on push to main.
#
# See docs/workflows.md

name: Deploy worker

on:
  workflow_call:
    inputs:
      environment:
        description: Wrangler environment (empty = production)
        type: string
        default: ''
  push:
    branches: [main]
    paths:
      - 'workers/content-api/**'
      - 'packages/content/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: Wrangler environment (empty = production, staging = staging)
        type: string
        default: ''

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npx turbo run build test --filter=@bonae/content-api-worker

      - id: cloudflare
        uses: ./.github/actions/cloudflare-account
        with:
          cloudflare_account_id_var: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare_account_id_secret: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy to Cloudflare Workers
        run: |
          args=(--var "COGNITO_USER_POOL_ID:${{ vars.COGNITO_USER_POOL_ID }}" --var "COGNITO_CLIENT_ID:${{ vars.COGNITO_CLIENT_ID }}")
          if [ -n "${{ inputs.environment }}" ]; then
            npx wrangler deploy --env "${{ inputs.environment }}" "${args[@]}"
          else
            npx wrangler deploy "${args[@]}"
          fi
        working-directory: workers/content-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.cloudflare.outputs.account_id }}
