# Build verification on push / PR. No deploy.
#
# See docs/workflows.md

name: CI

on:
  push:
    paths:
      - 'apps/static/**'
      - 'apps/admin/**'
      - 'packages/content/**'
      - 'workers/content-api/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'apps/static/**'
      - 'apps/admin/**'
      - 'packages/content/**'
      - 'workers/content-api/**'
      - '.github/workflows/ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            packages/content/package-lock.json
            apps/static/package-lock.json
            apps/admin/package-lock.json
            workers/content-api/package-lock.json

      - uses: ./.github/actions/build-content
      - run: npm run validate:published
        working-directory: packages/content

      - run: npm ci
        working-directory: apps/static
      - run: npm run build
        working-directory: apps/static

      - run: npm ci
        working-directory: apps/admin
      - run: npm run build
        working-directory: apps/admin

      - run: npm ci
        working-directory: workers/content-api
      - run: npm run build
        working-directory: workers/content-api
      - run: npm test
        working-directory: workers/content-api
