# Build verification on push / PR. No deploy.
#
# See docs/workflows.md

name: CI

on:
  push:
    paths:
      - 'apps/static/**'
      - 'apps/admin/**'
      - 'packages/content/**'
      - 'workers/content-api/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'apps/static/**'
      - 'apps/admin/**'
      - 'packages/content/**'
      - 'workers/content-api/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - '.github/workflows/ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-monorepo
      - run: npx turbo run build test validate:published
