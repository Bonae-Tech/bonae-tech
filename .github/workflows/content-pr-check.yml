# Validate content JSON on PRs. No deploy.
#
# See docs/workflows.md

name: Content PR check

on:
  pull_request:
    paths:
      - 'apps/static/content/**'
      - 'packages/content/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - '.github/workflows/content-pr-check.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-monorepo
      - run: npx turbo run build validate:published --filter=@bonae/content
