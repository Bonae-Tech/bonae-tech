# Validate content JSON on PRs. No deploy.
#
# See docs/workflows.md

name: Content PR check

on:
  pull_request:
    paths:
      - 'apps/static/content/**'
      - 'packages/content/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx turbo run build validate:published --filter=@bonae/content
      - run: npm run validate -w @bonae/content -- apps/static/content drafts
